name: Release On Merge

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

env:
  BINARY_NAME: rollbar-cli
  TAG_PREFIX: v

jobs:
  prepare:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      merged_sha: ${{ steps.meta.outputs.merged_sha }}
      tag: ${{ steps.meta.outputs.tag }}
      macos_release_enabled: ${{ steps.macos.outputs.enabled }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Detect macOS signing credentials
        id: macos
        env:
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          enabled=true
          missing_names=""
          for name in \
            APPLE_KEYCHAIN_PASSWORD \
            APPLE_NOTARY_ISSUER_ID \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_PRIVATE_KEY_BASE64 \
            APPLE_SIGNING_CERTIFICATE_P12_BASE64 \
            APPLE_SIGNING_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY; do
            if [ -z "${!name:-}" ]; then
              enabled=false
              missing_names="${missing_names}${name} "
            fi
          done

          echo "enabled=${enabled}" >> "${GITHUB_OUTPUT}"

          if [ "${enabled}" != "true" ]; then
            echo "Skipping macOS release assets because Apple signing/notarization secrets are missing: ${missing_names}" >&2
          fi

      - name: Compute tag and attach it to merged commit
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          MERGED_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          if [ -z "${MERGED_SHA}" ]; then
            echo "Missing merge commit SHA in event payload" >&2
            exit 1
          fi

          git fetch --force --tags origin
          git fetch --no-tags origin "${MERGED_SHA}"

          if ! git rev-parse --verify "${MERGED_SHA}^{commit}" >/dev/null 2>&1; then
            echo "Merged commit ${MERGED_SHA} is not available locally" >&2
            exit 1
          fi

          tag="$(git tag --points-at "${MERGED_SHA}" --list "${TAG_PREFIX}*" | sort -V | tail -n 1)"

          if [ -n "${tag}" ]; then
            echo "Reusing existing tag ${tag} for ${MERGED_SHA}"
          else
            tag="$(bash .github/scripts/next_calver.sh "${TAG_PREFIX}")"

            while git rev-parse -q --verify "refs/tags/${tag}" >/dev/null 2>&1; do
              existing_sha="$(git rev-list -n 1 "${tag}")"
              if [ "${existing_sha}" = "${MERGED_SHA}" ]; then
                echo "Tag ${tag} already points at ${MERGED_SHA}, reusing it"
                break
              fi

              echo "Tag ${tag} already exists at ${existing_sha}, fetching tags and retrying" >&2
              git fetch --force --tags origin

              tag="$(git tag --points-at "${MERGED_SHA}" --list "${TAG_PREFIX}*" | sort -V | tail -n 1)"
              if [ -n "${tag}" ]; then
                echo "Found existing tag ${tag} for ${MERGED_SHA} after refetch"
                break
              fi

              tag="$(bash .github/scripts/next_calver.sh "${TAG_PREFIX}")"
            done
          fi

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            existing_sha="$(git rev-list -n 1 "${tag}")"
            if [ "${existing_sha}" != "${MERGED_SHA}" ]; then
              echo "Resolved tag ${tag} points to ${existing_sha}, expected ${MERGED_SHA}" >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${tag}" "${MERGED_SHA}" -m "Release ${tag}"
            git push origin "refs/tags/${tag}"
          fi

          {
            echo "merged_sha=${MERGED_SHA}"
            echo "tag=${tag}"
          } >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    if: matrix.goos != 'darwin' || needs.prepare.outputs.macos_release_enabled == 'true'
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive_ext: zip
            runs_on: macos-latest
          - goos: darwin
            goarch: arm64
            archive_ext: zip
            runs_on: macos-latest
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            runs_on: ubuntu-latest
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            runs_on: ubuntu-latest
          - goos: windows
            goarch: amd64
            archive_ext: zip
            runs_on: ubuntu-latest
          - goos: windows
            goarch: arm64
            archive_ext: zip
            runs_on: ubuntu-latest

    steps:
      - name: Check out merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.merged_sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare macOS signing credentials
        if: matrix.goos == 'darwin'
        env:
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          signing_dir="${RUNNER_TEMP}/apple-signing"
          cert_path="${signing_dir}/signing-cert.p12"
          key_path="${signing_dir}/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          keychain_path="${RUNNER_TEMP}/app-signing.keychain-db"

          mkdir -p "${signing_dir}"
          printf '%s' "${APPLE_SIGNING_CERTIFICATE_P12_BASE64}" | base64 -D > "${cert_path}"
          printf '%s' "${APPLE_NOTARY_PRIVATE_KEY_BASE64}" | base64 -D > "${key_path}"

          security create-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security import "${cert_path}" -P "${APPLE_SIGNING_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${APPLE_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"
          security default-keychain -d user -s "${keychain_path}"
          security find-identity -v -p codesigning "${keychain_path}"

          {
            echo "APPLE_KEYCHAIN_PATH=${keychain_path}"
            echo "APPLE_NOTARY_KEY_PATH=${key_path}"
            echo "APPLE_SIGNING_DIR=${signing_dir}"
          } >> "${GITHUB_ENV}"

      - name: Build and package archive
        if: matrix.goos != 'darwin'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          bin_name="${BINARY_NAME}"
          if [ "${GOOS}" = "windows" ]; then
            bin_name="${bin_name}.exe"
          fi

          version="${TAG#${TAG_PREFIX}}"
          asset_name="${BINARY_NAME}_${version}_${GOOS}_${GOARCH}"
          stage_dir="dist/${asset_name}"
          mkdir -p "${stage_dir}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags="-s -w" -o "${stage_dir}/${bin_name}" .
          cp README.md LICENSE "${stage_dir}/"

          if [ "${ARCHIVE_EXT}" = "zip" ]; then
            (
              cd dist
              zip -rq "${asset_name}.zip" "${asset_name}"
            )
          else
            tar -C dist -czf "dist/${asset_name}.tar.gz" "${asset_name}"
          fi

          rm -rf "${stage_dir}"

      - name: Build, sign, and notarize macOS archive
        if: matrix.goos == 'darwin'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ needs.prepare.outputs.tag }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          bin_name="${BINARY_NAME}"
          version="${TAG#${TAG_PREFIX}}"
          asset_name="${BINARY_NAME}_${version}_${GOOS}_${GOARCH}"
          stage_dir="dist/${asset_name}"
          archive_path="dist/${asset_name}.zip"
          mkdir -p "${stage_dir}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags="-s -w" -o "${stage_dir}/${bin_name}" .
          cp README.md LICENSE "${stage_dir}/"

          codesign --force --options runtime --timestamp --sign "${APPLE_SIGNING_IDENTITY}" "${stage_dir}/${bin_name}"
          codesign --verify --verbose=2 "${stage_dir}/${bin_name}"

          ditto -c -k --keepParent "${stage_dir}" "${archive_path}"

          xcrun notarytool submit "${archive_path}" \
            --key "${APPLE_NOTARY_KEY_PATH}" \
            --key-id "${APPLE_NOTARY_KEY_ID}" \
            --issuer "${APPLE_NOTARY_ISSUER_ID}" \
            --wait

          rm -rf "${stage_dir}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

      - name: Clean up macOS signing credentials
        if: always() && matrix.goos == 'darwin'
        run: |
          set -euo pipefail

          if [ -n "${APPLE_KEYCHAIN_PATH:-}" ] && [ -f "${APPLE_KEYCHAIN_PATH}" ]; then
            security delete-keychain "${APPLE_KEYCHAIN_PATH}" || true
          fi

          rm -rf "${APPLE_SIGNING_DIR:-}"

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          find . -maxdepth 1 -type f ! -name 'sha256sums.txt' -print0 \
            | sort -z \
            | xargs -0 sha256sum > sha256sums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              dist/*
          fi
